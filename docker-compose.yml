version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: doudizhu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       doudizhu
      POSTGRES_USER:     doudizhu
      POSTGRES_PASSWORD: doudizhu_dev   # 生产环境请通过 secrets 注入
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 首次启动自动建表
      - ./server/src/history/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U doudizhu -d doudizhu']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: doudizhu-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
